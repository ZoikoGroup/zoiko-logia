services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: zoiko
      POSTGRES_PASSWORD: zoiko
      POSTGRES_DB: zoiko
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoiko -d zoiko"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://zoiko:zoiko@postgres:5432/zoiko
      # Non-superuser role for request-time queries — provisioned automatically
      # by app/main.py's lifespan on startup. Needed for Postgres RLS
      # (sources/source_versions tenant isolation) to actually apply: RLS
      # always exempts superusers, and DATABASE_URL's "zoiko" role is one.
      APP_DATABASE_URL: postgresql+asyncpg://zoiko_app:zoiko_app@postgres:5432/zoiko
      # Without this, risk_classifier.py's _get_classifier_pipeline() never
      # loads the real zero-shot model — every query gets a fixed 0.5
      # confidence, which is always below the 0.65 routing threshold, so
      # every query falls back to "needs clarification" regardless of content.
      ENABLE_ML_CLASSIFIER: "true"
      # The classifier model is already baked into the image's HF cache.
      # Without these, huggingface_hub still does an online freshness check
      # on every load; when that check hangs (flaky/sandboxed Docker
      # networking), it can add 40+ seconds to every single request instead
      # of failing over to the cache. Force it to use the local cache only.
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:3001","http://localhost:3005"]'
      # Auth is now Supabase-backed — set these to a real Supabase project
      # for sign-up/sign-in to work (see backend/.env.example).
      SUPABASE_URL: ""
      SUPABASE_SERVICE_ROLE_KEY: ""
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://zoiko:zoiko@postgres:5432/zoiko
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: "no"
    command: >
      sh -c "sleep 5 &&
      python scripts/seed_dev_user.py &&
      python scripts/ingest_reference_sources.py"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8010/api/v1
    ports:
      - "3005:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
